<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1933"/>
      <stop offset="0.45" stop-color="#1f3f70"/>
      <stop offset="1" stop-color="#6ca6d9"/>
    </linearGradient>
    <filter id="n" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="11"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12"/>
      </feComponentTransfer>
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#g)"/>
  <rect width="512" height="512" filter="url(#n)" opacity="0.55"/>
</svg>
